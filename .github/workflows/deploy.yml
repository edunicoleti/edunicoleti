name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Debug - List server directory structure
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.FTP_SERVER }}
          port: ${{ secrets.FTP_PORT }}
          username: ${{ secrets.FTP_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "=== HOME DIRECTORY ==="
            pwd
            echo ""
            echo "=== LISTING HOME ==="
            ls -lah
            echo ""
            echo "=== PUBLIC_HTML DETAILS ==="
            ls -lah public_html 2>/dev/null || echo "public_html not found or no access"
