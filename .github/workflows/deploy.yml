name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy to Hostinger via SFTP
        uses: Burnett01/rsync-deployer@master
        with:
          switches: -avz --delete
          path: ./dist/
          remote_path: ${{ secrets.FTP_REMOTE_PATH }}
          remote_host: ${{ secrets.FTP_SERVER }}
          remote_port: ${{ secrets.FTP_PORT }}
          remote_user: ${{ secrets.FTP_USERNAME }}
          remote_password: ${{ secrets.FTP_PASSWORD }}
