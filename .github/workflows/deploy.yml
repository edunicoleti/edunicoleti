name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Test SSH connection
        env:
          DEPLOY_HOST: ${{ secrets.FTP_SERVER }}
          DEPLOY_USER: ${{ secrets.FTP_USERNAME }}
          DEPLOY_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          DEPLOY_PORT: ${{ secrets.FTP_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p $DEPLOY_PORT $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          apt-get update -qq && apt-get install -qq -y sshpass > /dev/null 2>&1
          echo "Testing SSH connection..."
          sshpass -p "$DEPLOY_PASSWORD" ssh -p $DEPLOY_PORT $DEPLOY_USER@$DEPLOY_HOST "ls -la ${{ secrets.FTP_REMOTE_PATH }}" || echo "SSH test failed"

      - name: Deploy to Hostinger via rsync
        env:
          DEPLOY_HOST: ${{ secrets.FTP_SERVER }}
          DEPLOY_USER: ${{ secrets.FTP_USERNAME }}
          DEPLOY_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.FTP_REMOTE_PATH }}
          DEPLOY_PORT: ${{ secrets.FTP_PORT }}
        run: |
          sshpass -p "$DEPLOY_PASSWORD" rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no -p $DEPLOY_PORT" dist/ $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/
