name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Test SSH with verbose output
        env:
          DEPLOY_HOST: ${{ secrets.FTP_SERVER }}
          DEPLOY_USER: ${{ secrets.FTP_USERNAME }}
          DEPLOY_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          DEPLOY_PORT: ${{ secrets.FTP_PORT }}
        run: |
          apt-get update -qq && apt-get install -qq -y sshpass > /dev/null 2>&1
          echo "Teste 1: Conectar e executar um comando simples"
          sshpass -p "$DEPLOY_PASSWORD" ssh -p $DEPLOY_PORT -o StrictHostKeyChecking=no -v $DEPLOY_USER@$DEPLOY_HOST "pwd" 2>&1 | tail -20

      - name: Deploy to Hostinger
        if: false
        env:
          DEPLOY_HOST: ${{ secrets.FTP_SERVER }}
          DEPLOY_USER: ${{ secrets.FTP_USERNAME }}
          DEPLOY_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.FTP_REMOTE_PATH }}
          DEPLOY_PORT: ${{ secrets.FTP_PORT }}
        run: |
          mkdir -p ~/.ssh
          apt-get update -qq && apt-get install -qq -y sshpass > /dev/null 2>&1
          ssh-keyscan -p $DEPLOY_PORT $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          cd dist && tar czf - . | sshpass -p "$DEPLOY_PASSWORD" ssh -p $DEPLOY_PORT -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "cd $DEPLOY_PATH && tar xzf -" && cd ..
